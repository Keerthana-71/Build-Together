<!-- ============================================================
     STUDENT MOCK INTERVIEW PREPARATION SECTION
     This goes into the student dashboard.html
============================================================= -->

<section class="mi-prep-section" id="mockInterviewPrep">
    <div class="container">
        <div class="section-header">
            <h2><i class="fas fa-graduation-cap"></i> Mock Interview Preparation</h2>
            <p>Review course materials and prepare for your mock interview</p>
        </div>

        <!-- Status Overview -->
        <div class="prep-overview" id="prepOverview">
            <div class="overview-card loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading your preparation status...</p>
            </div>
        </div>

        <!-- Enrolled Courses with Interview Status -->
        <div class="enrolled-courses-section">
            <h3><i class="fas fa-book-open"></i> Enrolled Courses</h3>
            <div class="courses-list" id="coursesList">
                <div style="text-align: center; padding: 40px; color: #666;">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading courses...</p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Modal for viewing Q&A -->
<div id="qaModal" class="qa-modal" style="display: none;">
    <div class="qa-modal-content">
        <div class="qa-modal-header">
            <h2 id="qaModalTitle">Interview Questions & Answers</h2>
            <button class="qa-close-btn" onclick="closeQAModal()">×</button>
        </div>
        <div class="qa-modal-body" id="qaModalBody">
            <!-- Q&A content will be loaded here -->
        </div>
    </div>
</div>

<!-- ============================================================
     JAVASCRIPT FOR PREPARATION SECTION
============================================================= -->
<script>
// Load and display preparation materials
async function loadMockInterviewPrep() {
    try {
        const token = sessionStorage.getItem('token') || localStorage.getItem('token');
        if (!token) return;

        const response = await fetch('http://localhost:5000/api/interview/status', {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error('Failed to load preparation data');

        const courses = await response.json();
        displayPrepStatus(courses);
    } catch (error) {
        console.error('Error loading prep materials:', error);
    }
}

// Display preparation overview and courses
function displayPrepStatus(courses) {
    // Update overview
    const approvedCount = courses.filter(c => c.status === 'approved').length;
    const pendingCount = courses.filter(c => c.status === 'pending').length;

    const overviewHTML = `
        <div class="overview-card">
            <i class="fas fa-book"></i>
            <div class="stat-number">${courses.length}</div>
            <div class="stat-label">Enrolled Courses</div>
        </div>
        <div class="overview-card">
            <i class="fas fa-check-circle" style="color: #27ae60;"></i>
            <div class="stat-number">${approvedCount}</div>
            <div class="stat-label">Approved for Interview</div>
        </div>
        <div class="overview-card">
            <i class="fas fa-clock" style="color: #f39c12;"></i>
            <div class="stat-number">${pendingCount}</div>
            <div class="stat-label">Pending Review</div>
        </div>
    `;

    document.getElementById('prepOverview').innerHTML = overviewHTML;

    // Display courses
    displayCoursesPrep(courses);
}

// Display course cards with interview prep materials
function displayCoursesPrep(courses) {
    const coursesList = document.getElementById('coursesList');

    if (!courses.length) {
        coursesList.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No enrolled courses yet</p>
                <p style="font-size: 0.9rem;">Enroll in a course to see preparation materials</p>
            </div>
        `;
        return;
    }

    coursesList.innerHTML = courses.map(course => `
        <div class="course-prep-card">
            <div class="course-prep-header">
                <div class="course-icon"><i class="fas fa-graduation-cap"></i></div>
                <h4>${course.course_name}</h4>
            </div>
            <div class="course-prep-body">
                <span class="status-badge ${course.status}">
                    ${course.status.charAt(0).toUpperCase() + course.status.slice(1)}
                </span>

                <div class="course-info">
                    <div class="info-item">
                        <span class="info-label">Status:</span>
                        <span class="info-value">${formatStatus(course.status)}</span>
                    </div>
                    ${course.status === 'approved' ? `
                        <div class="info-item">
                            <span class="info-label">Questions Available:</span>
                            <span class="info-value">${course.qa_data ? course.qa_data.length : 0}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Uploaded:</span>
                            <span class="info-value">${formatDate(course.uploaded_at)}</span>
                        </div>
                    ` : `
                        <div class="info-item">
                            <span class="info-label">Requested:</span>
                            <span class="info-value">${formatDate(course.requested_at)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Note:</span>
                            <span class="info-value" style="font-size: 0.85rem;">
                                Admin will review your request soon
                            </span>
                        </div>
                    `}
                </div>

                <div class="course-actions">
                    ${course.status === 'approved' ? `
                        <button class="action-btn btn-view-materials" onclick="viewCourseQA('${encodeURIComponent(course.course_name)}', '${encodeURIComponent(JSON.stringify(course.qa_data))}')">
                            <i class="fas fa-eye"></i> View Q&A
                        </button>
                        <button class="action-btn btn-start-interview" onclick="goToMockInterview('${encodeURIComponent(course.course_name)}')">
                            <i class="fas fa-play-circle"></i> Start Interview
                        </button>
                    ` : `
                        <button class="action-btn btn-pending" disabled>
                            <i class="fas fa-hourglass-half"></i> Awaiting Approval
                        </button>
                    `}
                </div>
            </div>
        </div>
    `).join('');
}

// View Q&A in modal
function viewCourseQA(courseName, qaDataStr) {
    const courseName_decoded = decodeURIComponent(courseName);
    const qaData = JSON.parse(decodeURIComponent(qaDataStr));

    const modal = document.getElementById('qaModal');
    document.getElementById('qaModalTitle').textContent = `${courseName_decoded} - Preparation Materials`;

    let qaHTML = '';
    qaData.forEach((item, index) => {
        qaHTML += `
            <div class="qa-item">
                <div style="display: flex; align-items: start;">
                    <span class="qa-number">${index + 1}</span>
                    <div style="flex: 1;">
                        <div class="qa-question">${escapeHtml(item.question)}</div>
                        <div class="qa-answer">${escapeHtml(item.answer)}</div>
                    </div>
                </div>
            </div>
        `;
    });

    qaHTML += `
        <button class="download-btn-modal" onclick="downloadQAPDF('${courseName_decoded}')">
            <i class="fas fa-download"></i> Download as PDF
        </button>
    `;

    document.getElementById('qaModalBody').innerHTML = qaHTML;
    modal.style.display = 'flex';
    modal.classList.add('active');
}

// Close Q&A modal
function closeQAModal() {
    const modal = document.getElementById('qaModal');
    modal.style.display = 'none';
    modal.classList.remove('active');
}

// Go to mock interview
function goToMockInterview(courseName) {
    const course_decoded = decodeURIComponent(courseName);
    // Store selected course in session
    sessionStorage.setItem('selectedInterviewCourse', course_decoded);
    // Redirect to mock interview page
    window.location.href = 'mock-interview.html?course=' + encodeURIComponent(course_decoded);
}

// Download Q&A as PDF
function downloadQAPDF(courseName) {
    alert('Downloading PDF preparation materials for ' + courseName + '...\n(Feature implementation in progress)');
    // TODO: Implement PDF generation using libraries like jsPDF or pdfkit
}

// Helper functions
function formatStatus(status) {
    if (status === 'approved') return '✅ Approved';
    if (status === 'pending') return '⏳ Pending Admin Review';
    if (status === 'denied') return '❌ Denied';
    return status;
}

function formatDate(dateStr) {
    if (!dateStr) return 'N/A';
    return new Date(dateStr).toLocaleDateString('en-IN', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Load on page load
document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('mockInterviewPrep')) {
        loadMockInterviewPrep();
    }
});

// Close modal when clicking outside
window.addEventListener('click', (e) => {
    const modal = document.getElementById('qaModal');
    if (modal && e.target === modal) {
        closeQAModal();
    }
});
</script>
