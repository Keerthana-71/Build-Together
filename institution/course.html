<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Build Together</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><h2>Build Together</h2></div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="course.html" class="nav-link active">Courses</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-get-started">
                <a href="#" class="get-started-btn" id="getStartedBtn"><i class="fas fa-rocket"></i> Get Started</a>
            </div>
            <div class="hamburger"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
        </div>
    </nav>

    <!-- Courses Hero -->
    <section class="courses-hero">
        <div class="container">
            <div class="section-header">
                <h1 style="color: white;">Our Courses</h1>
                <p style="color: rgba(255,255,255,0.9);">Choose from our comprehensive range of professional courses designed for career success</p>
            </div>
        </div>
    </section>

    <!-- Categories -->
    <section class="course-categories">
        <div class="container">
            <div class="category-tabs">
                <button class="tab-btn active" data-category="all">All Courses</button>
                <button class="tab-btn" data-category="web">Web Development</button>
                <button class="tab-btn" data-category="data">Data Science</button>
                <button class="tab-btn" data-category="mobile">Mobile App</button>
                <button class="tab-btn" data-category="business">Business</button>
            </div>
        </div>
    </section>

    <!-- Courses Grid -->
    <section class="courses-grid-section">
        <div class="container">
            <div class="courses-grid" id="coursesGrid">
                <!-- Courses populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Modal -->
    <div class="modal" id="getStartedModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Choose Your Role</h2>
            <div class="role-buttons">
                <button class="role-btn student" data-role="student"><i class="fas fa-user-graduate"></i><span>Student</span></button>
                <button class="role-btn admin" data-role="admin"><i class="fas fa-user-shield"></i><span>Admin</span></button>
                <button class="role-btn hr" data-role="hr"><i class="fas fa-user-tie"></i><span>HR</span></button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
