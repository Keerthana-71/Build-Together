<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #eff6ff; /* light blue */
        }

        .navbar {
            background: #1e3a8a;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        .title {
            text-align: center;
            padding: 30px;
        }
        .title h1 {
            color: #2563eb;
        }
        .login-box {
            width: 300px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
        }
        input {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
        }
        .footer {
            background: #1e3a8a;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .login-box {
                width: 90%;
                max-width: 380px;
                margin: 20px auto;
                padding: 16px;
            }
            .title {
                padding: 20px 15px;
            }
            button {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <h2>Build With Us Institution</h2>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
</div>

<!-- Title -->
<div class="title">
    <h1>Login</h1>
    <p>Enter your details to login</p>
</div>
<div class="login-box">
    <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>

        <button>Login</button>
    </form>
</div>
<div class="footer">
    <p>© 2026 Great Gaining Institution</p>
</div>
</body>
</html>
