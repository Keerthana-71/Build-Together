<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Chat Dashboard - Build Together Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #f1f5f9;
            overflow: hidden;
        }

        body { display: flex; flex-direction: column; }

        /* TOP NAV */
        .top-nav {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 2px 12px rgba(102,126,234,0.3);
            flex-shrink: 0;
        }
        .top-nav h2 { color: white; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .top-nav-right { display: flex; align-items: center; gap: 12px; }
        .admin-badge { background: rgba(255,255,255,0.2); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .logout-btn { background: rgba(255,255,255,0.15); color: white; border: none; padding: 7px 14px; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 0.82rem; font-weight: 600; }
        .logout-btn:hover { background: rgba(255,255,255,0.25); }

        /* MAIN LAYOUT — fills remaining height */
        .chat-layout {
            display: flex;
            flex: 1;
            min-height: 0;   /* critical for flex children to scroll */
            overflow: hidden;
        }

        /* LEFT — SESSION PANEL */
        .session-panel {
            width: 300px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            min-height: 0;
            overflow: hidden;
        }
        .session-panel-header {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .session-panel-header h3 { font-size: 0.95rem; color: #1e293b; }
        .refresh-btn { background: #f1f5f9; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; color: #667eea; font-size: 0.82rem; font-family: inherit; font-weight: 600; }
        .refresh-btn:hover { background: #ede9fe; }

        /* THIS is the scrollable list */
        .session-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        .session-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f8fafc;
            cursor: pointer;
            transition: background 0.2s;
            display: flex; align-items: center; gap: 12px;
        }
        .session-item:hover { background: #f8fafc; }
        .session-item.active { background: #ede9fe; border-left: 3px solid #667eea; }
        .session-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1rem; flex-shrink: 0;
        }
        .session-info { flex: 1; min-width: 0; }
        .session-info h4 { font-size: 0.88rem; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-info span { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .unread-badge {
            background: #ef4444; color: white; border-radius: 50%;
            width: 20px; height: 20px; font-size: 0.7rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .no-sessions { padding: 40px 20px; text-align: center; color: #94a3b8; font-size: 0.85rem; }

        /* RIGHT — CHAT PANEL */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        /* OVERVIEW STATE */
        .overview-state {
            flex: 1; display: flex; flex-direction: column;
            overflow: hidden; background: #f8fafc;
        }
        .overview-header {
            padding: 20px 24px 12px;
            flex-shrink: 0;
        }
        .overview-header h3 { font-size: 1rem; color: #1e293b; font-weight: 600; }
        .overview-header p { font-size: 0.8rem; color: #94a3b8; margin-top: 2px; }
        .overview-grid {
            flex: 1; overflow-y: auto; padding: 0 24px 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px; align-content: start;
        }
        .overview-card {
            background: white; border-radius: 14px; padding: 16px;
            cursor: pointer; border: 2px solid transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .overview-card:hover { border-color: #667eea; box-shadow: 0 4px 16px rgba(102,126,234,0.15); }
        .overview-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .overview-card-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.1rem; flex-shrink: 0;
        }
        .overview-card-info { flex: 1; min-width: 0; }
        .overview-card-info h4 { font-size: 0.88rem; color: #1e293b; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .overview-card-info span { font-size: 0.75rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .overview-card-unread {
            background: #ef4444; color: white; border-radius: 50%;
            width: 22px; height: 22px; font-size: 0.72rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .overview-card-preview {
            font-size: 0.78rem; color: #64748b; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
            padding: 8px 10px; background: #f8fafc; border-radius: 8px;
        }
        .overview-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .overview-card-time { font-size: 0.72rem; color: #94a3b8; }
        .overview-card-btn {
            font-size: 0.75rem; color: #667eea; font-weight: 600;
            background: #ede9fe; border: none; padding: 4px 10px;
            border-radius: 6px; cursor: pointer; font-family: inherit;
        }
        .overview-empty { grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 60px 20px; font-size: 0.88rem; }
        .overview-empty i { font-size: 2.5rem; color: #e2e8f0; display: block; margin-bottom: 10px; }

        /* ACTIVE CHAT AREA */
        #activeChatArea {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        .back-btn {
            background: #f1f5f9; border: none; padding: 7px 12px; border-radius: 8px;
            cursor: pointer; color: #667eea; font-size: 0.82rem; font-family: inherit;
            font-weight: 600; display: flex; align-items: center; gap: 5px; flex-shrink: 0;
        }
        .back-btn:hover { background: #ede9fe; }
        .chat-panel-header {
            background: white; padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }
        .chat-panel-header .user-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 1.1rem;
        }
        .chat-panel-header-info h4 { font-size: 0.95rem; color: #1e293b; }
        .chat-panel-header-info span { font-size: 0.78rem; color: #94a3b8; }
        .online-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 4px; }

        /* SCROLLABLE MESSAGES */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8fafc;
        }

        .msg { display: flex; gap: 8px; align-items: flex-end; }
        .msg.user { justify-content: flex-start; }
        .msg.admin { justify-content: flex-end; }
        .msg-bubble {
            max-width: 65%; padding: 10px 14px;
            border-radius: 16px; font-size: 0.85rem; line-height: 1.5;
            word-break: break-word;
        }
        .msg.user .msg-bubble { background: white; color: #1e293b; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .msg.admin .msg-bubble { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-bottom-right-radius: 4px; }
        .msg-time { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }
        .msg-icon {
            width: 30px; height: 30px; border-radius: 50%;
            background: #e2e8f0; display: flex; align-items: center;
            justify-content: center; font-size: 0.8rem; color: #64748b; flex-shrink: 0;
        }

        .typing-indicator { font-size: 0.78rem; color: #94a3b8; padding: 0 24px 8px; flex-shrink: 0; }

        /* SCROLL BUTTONS */
        .scroll-btn {
            position: absolute; right: 20px;
            width: 36px; height: 36px; border-radius: 50%;
            background: white; border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #667eea; font-size: 0.9rem;
            transition: opacity 0.2s; z-index: 10;
        }
        .scroll-btn:hover { background: #ede9fe; }
        #scrollTopBtn { top: 70px; }
        #scrollBottomBtn { bottom: 80px; }

        .chat-input-area {
            background: white; padding: 16px 24px;
            border-top: 1px solid #e2e8f0;
            display: flex; gap: 10px; align-items: center;
            flex-shrink: 0;
        }
        #adminInput {
            flex: 1; padding: 12px 16px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 0.88rem; font-family: inherit; outline: none;
            transition: border 0.2s;
        }
        #adminInput:focus { border-color: #667eea; }
        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; padding: 12px 20px;
            border-radius: 12px; cursor: pointer; font-size: 0.88rem;
            font-family: inherit; font-weight: 600; display: flex; align-items: center; gap: 6px;
            flex-shrink: 0;
        }
        .send-btn:hover { opacity: 0.9; }

        /* LOGIN OVERLAY */
        .login-overlay {
            position: fixed; inset: 0; background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center; z-index: 999;
        }
        .login-box {
            background: white; border-radius: 20px; padding: 40px;
            width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-box h2 { color: #1e293b; margin-bottom: 6px; font-size: 1.3rem; }
        .login-box p { color: #94a3b8; font-size: 0.85rem; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0;
            border-radius: 12px; font-size: 0.88rem; font-family: inherit;
            outline: none; margin-bottom: 12px; transition: border 0.2s;
        }
        .login-box input:focus { border-color: #667eea; }
        .login-box button {
            width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; border-radius: 12px; font-size: 0.95rem;
            font-family: inherit; font-weight: 600; cursor: pointer;
        }
        .login-error { color: #ef4444; font-size: 0.8rem; margin-top: 8px; display: none; }
    </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2>🔐 Admin Login</h2>
        <p>Sign in to access the chat dashboard</p>
        <input type="email" id="loginEmail" placeholder="Admin Email" />
        <input type="password" id="loginPassword" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()" />
        <button onclick="adminLogin()">Login</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- TOP NAV -->
<div class="top-nav">
    <h2><i class="fas fa-comments"></i> Live Chat Dashboard</h2>
    <div class="top-nav-right">
        <span class="admin-badge" id="adminName">Admin</span>
        <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</div>

<!-- MAIN LAYOUT -->
<div class="chat-layout">

    <!-- SESSION LIST -->
    <div class="session-panel">
        <div class="session-panel-header">
            <h3><i class="fas fa-users" style="color:#667eea;margin-right:6px;"></i> Conversations</h3>
            <button class="refresh-btn" onclick="loadSessions()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="session-list" id="sessionList">
            <div class="no-sessions"><i class="fas fa-comment-slash" style="font-size:2rem;margin-bottom:8px;display:block;"></i>No conversations yet</div>
        </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel">
        <div class="overview-state" id="overviewState">
            <div class="overview-header">
                <h3><i class="fas fa-users" style="color:#667eea;margin-right:8px;"></i>All Conversations</h3>
                <p>Click on any user to open their chat</p>
            </div>
            <div class="overview-grid" id="overviewGrid">
                <div class="overview-empty"><i class="fas fa-comment-slash"></i>No conversations yet</div>
            </div>
        </div>

        <div id="activeChatArea">
            <div class="chat-panel-header">
                <button class="back-btn" onclick="backToOverview()"><i class="fas fa-arrow-left"></i> All Chats</button>
                <div class="user-avatar" id="activeAvatar">U</div>
                <div class="chat-panel-header-info">
                    <h4 id="activeUserName">User</h4>
                    <span id="activeUserEmail"><span class="online-dot"></span>Active now</span>
                </div>
            </div>
            <button class="scroll-btn" id="scrollTopBtn" onclick="scrollMessages('top')" title="Scroll to top"><i class="fas fa-chevron-up"></i></button>
            <button class="scroll-btn" id="scrollBottomBtn" onclick="scrollMessages('bottom')" title="Scroll to bottom"><i class="fas fa-chevron-down"></i></button>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator" style="display:none;">User is typing...</div>
            <div class="chat-input-area">
                <input type="text" id="adminInput" placeholder="Type your reply..." onkeydown="if(event.key==='Enter')sendAdminReply()" />
                <button class="send-btn" onclick="sendAdminReply()"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
let token         = null;
let activeSession = null;
let socket        = null;
let sessions      = [];

sync function adminLogin() {
  // ── ADMIN LOGIN ──
a  const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errEl    = document.getElementById('loginError');
    errEl.style.display = 'none';

    if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.style.display = 'block'; return; }

    try {
       nst data = await res.json();
        if const res  = await fetch('http://localhost:5000/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        co (!res.ok) { errEl.textContent = data.error || 'Login failed.'; errEl.style.display = 'block'; return; }
        if (data.user.role !== 'admin') { errEl.textContent = 'Access denied. Admin only.'; errEl.style.display = 'block'; return; }

        token = data.token;
        document.getElementById('adminName').textContent = data.user.name;
        document.getElementById('loginOverlay').style.display = 'none';
        initSocket();
        loadSessions();
        setInterval(loadSessions, 15000);
    } catch(e) {
        errEl.textContent = 'Server error. Make sure server is running.';
        errEl.style.display = 'block';
    }
}

function adminLogout() {
    token = null; activeSession = null;
    if (socket) socket.disconnect();
    document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('overviewState').style.display = 'flex';
    document.getElementById('activeChatArea').style.display = 'none';
}

// ── SOCKET ──
function initSocket() {
    socket = io('http://localhost:5000');
    socket.emit('admin_join');

    socket.on('admin_new_message', (data) => {
        // update or add session in list
        const existing = sessions.find(x => x.session_id === data.session_id);
        if (existing) {
            if (data.sender === 'user' && activeSession !== data.session_id) {
                existing.unread = (existing.unread || 0) + 1;
            }
            existing.last_message = data.created_at;
        } else {
            sessions.unshift({
                session_id: data.session_id,
                user_name: data.user_name || 'Guest',
                user_email: data.user_email || '',
                unread: data.sender === 'user' ? 1 : 0,
                last_message: data.created_at
            });
        }
        renderSessions();

        // append to open chat
        if (activeSession === data.session_id && data.sender === 'user') {
            appendMessage(data);
            markRead(activeSession);
        }
    });
}

// ── LOAD SESSIONS ──
async function loadSessions() {
    if (!token) return;
    try {
        const res  = await fetch('http://localhost:5000/api/chat/sessions', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        // preserve unread counts for active session
        sessions = data;
        renderSessions();
    } catch(e) {}
}

// ── RENDER SESSIONS ──
function renderSessions() {
    const list = document.getElementById('sessionList');
    if (!sessions.length) {
        list.innerHTML = '<div class="no-sessions"><i class="fas fa-comment-slash" style="font-size:2rem;margin-bottom:8px;display:block;"></i>No conversations yet</div>';
        renderOverview();
        return;
    }

    const scrollTop = list.scrollTop;
    list.innerHTML = sessions.map(s => {
        const name  = s.user_name  || 'Guest';
        const email = s.user_email || '';
        const isActive = activeSession === s.session_id;
        const unread = parseInt(s.unread) || 0;
        return `<div class="session-item ${isActive ? 'active' : ''}"
                    data-sid="${s.session_id}"
                    data-name="${name.replace(/"/g, '&quot;')}"
                    data-email="${email.replace(/"/g, '&quot;')}"
                    onclick="openSession(this.dataset.sid, this.dataset.name, this.dataset.email)">
                    <div class="session-avatar">${name.charAt(0).toUpperCase()}</div>
                    <div class="session-info">
                        <h4>${name}</h4>
                        <span>${email || 'Guest'}</span>
                    </div>
                    ${unread > 0 ? `<div class="unread-badge">${unread}</div>` : ''}
                </div>`;
    }).join('');
    list.scrollTop = scrollTop;
    renderOverview();
}

// ── RENDER OVERVIEW GRID ──
function renderOverview() {
    const grid = document.getElementById('overviewGrid');
    if (!sessions.length) {
        grid.innerHTML = '<div class="overview-empty"><i class="fas fa-comment-slash"></i>No conversations yet</div>';
        return;
    }
    grid.innerHTML = sessions.map(s => {
        const name   = s.user_name  || 'Guest';
        const email  = s.user_email || 'Guest';
        const unread = parseInt(s.unread) || 0;
        const time   = s.last_message ? new Date(s.last_message).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : '';
        return `<div class="overview-card"
                    data-sid="${s.session_id}"
                    data-name="${name.replace(/"/g, '&quot;')}"
                    data-email="${email.replace(/"/g, '&quot;')}"
                    onclick="openSession(this.dataset.sid, this.dataset.name, this.dataset.email)">
                    <div class="overview-card-top">
                        <div class="overview-card-avatar">${name.charAt(0).toUpperCase()}</div>
                        <div class="overview-card-info">
                            <h4>${name}</h4>
                            <span>${email}</span>
                        </div>
                        ${unread > 0 ? `<div class="overview-card-unread">${unread}</div>` : ''}
                    </div>
                    <div class="overview-card-preview"><i class="fas fa-comment" style="color:#667eea;margin-right:5px;"></i>Click to view conversation</div>
                    <div class="overview-card-footer">
                        <span class="overview-card-time">${time ? '🕐 ' + time : ''}</span>
                        <button class="overview-card-btn">Reply <i class="fas fa-arrow-right"></i></button>
                    </div>
                </div>`;
    }).join('');
}

// ── OPEN SESSION ──
async function openSession(session_id, user_name, user_email) {
    if (activeSession === session_id) return;
    activeSession = session_id;

    document.getElementById('overviewState').style.display  = 'none';
    document.getElementById('activeChatArea').style.display = 'flex';
    document.getElementById('activeAvatar').textContent     = (user_name || 'G').charAt(0).toUpperCase();
    document.getElementById('activeUserName').textContent   = user_name || 'Guest';
    document.getElementById('activeUserEmail').innerHTML    = '<span class="online-dot"></span>' + (user_email || 'Guest');

    const msgs = document.getElementById('chatMessages');
    msgs.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;font-size:0.85rem;">Loading messages...</div>';

    renderSessions();

    try {
        const res  = await fetch('http://localhost:5000/api/chat/history/' + session_id, { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        msgs.innerHTML = '';
        if (!data.length) {
            msgs.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:20px;font-size:0.85rem;">No messages yet</div>';
        } else {
            data.forEach(m => appendMessage(m));
        }
        msgs.scrollTop = msgs.scrollHeight;
    } catch(e) {
        msgs.innerHTML = '<div style="text-align:center;color:#ef4444;padding:20px;font-size:0.85rem;">Failed to load messages</div>';
    }

    markRead(session_id);
    document.getElementById('adminInput').focus();
}

// ── BACK TO OVERVIEW ──
function backToOverview() {
    activeSession = null;
    document.getElementById('activeChatArea').style.display = 'none';
    document.getElementById('overviewState').style.display  = 'flex';
    renderSessions();
}

// ── SCROLL BUTTONS ──
function scrollMessages(dir) {
    const msgs = document.getElementById('chatMessages');
    msgs.scrollTo({ top: dir === 'top' ? 0 : msgs.scrollHeight, behavior: 'smooth' });
}

// ── APPEND MESSAGE ──
function appendMessage(data) {
    const msgs = document.getElementById('chatMessages');

    // remove "loading" or "no messages" placeholder
    const placeholder = msgs.querySelector('[data-placeholder]');
    if (placeholder) placeholder.remove();

    const raw  = data.created_at ? new Date(data.created_at) : new Date();
    const time = isNaN(raw) ? '' : raw.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    const div  = document.createElement('div');
    div.className = 'msg ' + (data.sender || 'user');

    if (data.sender === 'admin') {
        div.innerHTML = `
            <div style="text-align:right;flex:1;">
                <div class="msg-bubble">${data.message}</div>
                <div class="msg-time" style="text-align:right;">You · ${time}</div>
            </div>
            <div class="msg-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;"><i class="fas fa-user-shield"></i></div>`;
    } else {
        div.innerHTML = `
            <div class="msg-icon"><i class="fas fa-user"></i></div>
            <div style="flex:1;">
                <div class="msg-bubble">${data.message}</div>
                <div class="msg-time">${data.user_name || 'User'} · ${time}</div>
            </div>`;
    }

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
}

// ── SEND REPLY ──
function sendAdminReply() {
    const input = document.getElementById('adminInput');
    const text  = input.value.trim();
    if (!text || !activeSession) return;
    input.value = '';
    appendMessage({ sender: 'admin', message: text, created_at: new Date() });
    socket.emit('admin_message', { session_id: activeSession, message: text });
}

// ── MARK READ ──
async function markRead(session_id) {
    if (!token) return;
    try {
        await fetch('http://localhost:5000/api/chat/mark-read/' + session_id, {
            method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
        });
        const s = sessions.find(x => x.session_id === session_id);
        if (s) { s.unread = 0; renderSessions(); }
    } catch(e) {}
}
</script>
