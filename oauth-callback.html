<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging you in... - Build Together Institute</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: white; border-radius: 20px; padding: 48px 40px;
            text-align: center; max-width: 380px; width: 90%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
        }
        .spinner {
            width: 56px; height: 56px; border: 5px solid #ede9fe;
            border-top-color: #667eea; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { color: #1e293b; font-size: 1.3rem; margin-bottom: 8px; }
        p  { color: #64748b; font-size: 0.9rem; }
        .error-icon { font-size: 3rem; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card" id="card">
    <div class="spinner"></div>
    <h2>Logging you in...</h2>
    <p>Please wait while we set up your session.</p>
</div>

<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const name   = params.get('name');
    const email  = params.get('email');
    const role   = params.get('role');

    if (!token) {
        document.getElementById('card').innerHTML =
            '<div class="error-icon">⚠️</div>' +
            '<h2>Login Failed</h2>' +
            '<p>Could not complete OAuth login. <a href="apply.html" style="color:#667eea;font-weight:600;">Try again</a></p>';
        return;
    }

    // Store in sessionStorage — same keys used by the rest of the app
    sessionStorage.setItem('loggedIn', 'true');
    sessionStorage.setItem('token',     token);
    sessionStorage.setItem('userName',  name  || '');
    sessionStorage.setItem('userEmail', email || '');
    sessionStorage.setItem('userRole',  role  || 'student');

    // Redirect to dashboard (or wherever they were going)
    const dest = sessionStorage.getItem('redirectAfterLogin');
    sessionStorage.removeItem('redirectAfterLogin');
    const target = dest || (role === 'admin' ? 'admin-dashboard.html' : 'dashboard.html');

    setTimeout(() => { window.location.href = target; }, 800);
})();
</script>
</body>
</html>
